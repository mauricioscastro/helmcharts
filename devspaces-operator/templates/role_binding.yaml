# Custom ClusterRole with delete permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: devspaces-operator-reader
  labels:
    {{- include "helm.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
- kind: ServiceAccount
  name: default
  namespace: {{ .Release.Namespace }}
---  
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: devspaces-operator-deleter
  labels:
    {{- include "helm.labels" . | nindent 4 }}  
rules:
- apiGroups: ["apps"]
  resources: ["*"]
  verbs: ["get", "list", "watch", "delete", "deletecollection"]
- apiGroups: ["operators.coreos.com"]
  resources: ["*"]
  verbs: ["get", "list", "watch", "delete", "deletecollection"]
- apiGroups: ["apiextensions.k8s.io"]
  resources: ["customresourcedefinitions"]
  verbs: ["get", "list", "watch", "delete"]
---
# RoleBinding: scoped delete in openshift-operators namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: devspaces-operator-deleter-openshift-operators
  namespace: openshift-operators
  labels:
    {{- include "helm.labels" . | nindent 4 }}  
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: devspaces-operator-deleter
subjects:
- kind: ServiceAccount
  name: default
  namespace: {{ .Release.Namespace }}
---
# ClusterRoleBinding: same permissions cluster-wide
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: devspaces-operator-deleter-cluster
  labels:
    {{- include "helm.labels" . | nindent 4 }}  
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: devspaces-operator-deleter
subjects:
- kind: ServiceAccount
  name: default
  namespace: {{ .Release.Namespace }}