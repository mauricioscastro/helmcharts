apiVersion: v1
kind: Service
metadata:
  name: glauth
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "helm.labels" . | nindent 4 }}  
spec:
  ports:
    - name: ldap
      port: 389
      targetPort: 3389
      protocol: TCP
    # - name: sldap
    #   port: 636
    #   targetPort: 3636
    #   protocol: TCP
  selector:
    app: glauth