kind: ConfigMap
apiVersion: v1
metadata:
  name: authelia-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: authelia  
data:
  configuration.yml: |
    server:
      address: 'tcp://:9091'

    theme: 'dark'

    # Log settings
    log:
      level: trace
      format: 'text' 
      keep_stdout: true      

    identity_validation:
      reset_password:
        # authelia crypto rand --length 64 --charset alphanumeric
        jwt_secret: 'ZB5J2RVWAVNqy4lapPeJUY5W61BcdjTRZZBcenlokecpBw5OYY2kbHzzFWWg04tZ'

    # Authentication backend using a file-based user database
    authentication_backend:
      # file:
      #   path: /config/users.yml
      {{- .Values.authentication_backend | toYaml | nindent 6 }}

    # Access control rules
    access_control:
      default_policy: "one_factor"
      rules:
        - domain: "{{ .Values.domain }}"
          policy: one_factor

    # Session settings
    session:
      secret: 'ZB5J2RVWAVNqy4lapPeJUY5W61BcdjTRZZBcenlokecpBw5OYY2kbHzzFWWg04tZ' 
      name: "authelia_session"
      remember_me: -1
      cookies:
      - name: 'authelia_session'
        domain: "{{ .Values.domain }}"
        authelia_url: https://{{ .Values.authelia_host_name }}.{{ .Values.domain }}

    storage:
      encryption_key: 'ZB5J2RVWAVNqy4lapPeJUY5W61BcdjTRZZBcenlokecpBw5OYY2kbHzzFWWg04tZ'
      local:
        path: '/tmp/db.sqlite3'

    notifier:
      filesystem:
        filename: '/tmp/notification.txt'

    # OpenID Connect 1.0 Provider settings
    identity_providers:
      oidc:
        lifespans:
          access_token: 1h
          refresh_token: 30d        
        cors:
          endpoints:
          - authorization
          - token
          - userinfo
          - introspection
          - revocation
          allowed_origins_from_client_redirect_uris: true
        jwks:
          - key_id: 'authelia-rsa-key'
            algorithm: 'RS256'
            use: 'sig'
