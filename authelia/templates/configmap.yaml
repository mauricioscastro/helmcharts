kind: ConfigMap
apiVersion: v1
metadata:
  name: authelia-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: authelia  
data:
  configuration.yml: |
    server:
      address: 'tcp://:9091'

    theme: 'dark'

    # Log settings
    log:
      level: trace
      format: 'text' 
      keep_stdout: true      

    identity_validation:
      reset_password:
        jwt_secret: 'ZB5J2RVWAVNqy4lapPeJUY5W61BcdjTRZZBcenlokecpBw5OYY2kbHzzFWWg04tZ'

    # Authentication backend using a file-based user database
    authentication_backend:
      # file:
      #   path: /config/users.yml
      {{- .Values.authentication_backend | toYaml | nindent 6 }}

    # Access control rules
    access_control:
      default_policy: "one_factor"
      rules:
        - domain: "{{ .Values.domain }}"
          policy: one_factor

    # Session settings
    session:
      secret: 'ZB5J2RVWAVNqy4lapPeJUY5W61BcdjTRZZBcenlokecpBw5OYY2kbHzzFWWg04tZ' 
      name: "authelia_session"
      remember_me: -1
      cookies:
      - name: 'authelia_session'
        domain: "{{ .Values.domain }}"
        authelia_url: https://{{ .Values.authelia_host_name }}.{{ .Values.domain }}

    storage:
      encryption_key: 'ZB5J2RVWAVNqy4lapPeJUY5W61BcdjTRZZBcenlokecpBw5OYY2kbHzzFWWg04tZ'
      local:
        path: '/tmp/db.sqlite3'

    notifier:
      filesystem:
        filename: '/tmp/notification.txt'

    # OpenID Connect 1.0 Provider settings
    identity_providers:
      oidc:
        lifespans:
          access_token: 1h
          refresh_token: 30d        
        cors:
          endpoints:
          - authorization
          - token
          - userinfo
          - introspection
          - revocation
          allowed_origins_from_client_redirect_uris: true
        jwks:
          - key_id: 'authelia-rsa-key'
            algorithm: 'RS256'
            use: 'sig'
            key: |-
              {{- .Files.Get .Values.idp.jwks.pkfile | nindent 14 }}
        claims_policies:
          trustify_policy:
            access_token:
            - groups
            id_token:
            - groups     
          tas_policy:
            id_token:
            - name
            - email
            - email_verified
            - preferred_username   
        scopes:
          rhtpadw: {}
          rhtpadr: {}
          rhtpadu: {}
          rhtpadd: {}
        clients:
          - client_id: devhub
            client_name: devhub
            client_secret: {{ .Values.clients.developer_hub.client_secret }}
            authorization_policy: one_factor
            consent_mode: implicit
            public: false
            redirect_uris:
              {{- tpl (toYaml .Values.clients.developer_hub.redirect_uris) . | nindent 14 }}
            scopes:
              - openid
              - profile
              - email
              - groups
              - offline_access
            grant_types:
              - refresh_token
              - authorization_code
            response_types:
              - code
            userinfo_signed_response_alg: none

          - client_id: rhtpa-cli
            client_name: rhtpa-cli
            client_secret: {{ .Values.clients.trusted_profile_analyser.client_secret }}
            authorization_policy: one_factor
            consent_mode: implicit
            public: false
            redirect_uris: []
            scopes:
              - openid
              - profile
              - email
              - groups
              - offline_access
              - rhtpadw
              - rhtpadr
              - rhtpadu
              - rhtpadd
            grant_types:
              - authorization_code
            response_types:
              - code
              - token
              - id_token
              - id_token token
            access_token_signed_response_alg: 'RS256'

          - client_id: rhtpa-front
            client_name: rhtpa-front
            authorization_policy: one_factor
            consent_mode: implicit
            # pre_configured_consent_duration: 1y
            public: true
            require_pkce: true
            pkce_challenge_method: S256
            claims_policy: trustify_policy
            redirect_uris: 
              {{- tpl (toYaml .Values.clients.trusted_profile_analyser.redirect_uris) . | nindent 14 }}
            scopes:
              - openid
              - profile
              - email
              - groups
              - rhtpadw
              - rhtpadr
              - rhtpadu
              - rhtpadd
            grant_types:
              - authorization_code
              - implicit
            response_types:
              - code
              - token
              - id_token
              - id_token token
            response_modes:
              - 'query'            
              - 'fragment'
              - 'form_post'
            token_endpoint_auth_method: none
            access_token_signed_response_alg: 'RS256'

          - client_id: trusted-artifact-signer
            client_name: trusted-artifact-signer
            client_secret: {{ .Values.clients.trusted_artifact_signer.client_secret }}
            public: false
            authorization_policy: one_factor
            consent_mode: implicit
            claims_policy: tas_policy
            scopes: 
              - openid
              - profile
              - email
            grant_types:
              - 'urn:ietf:params:oauth:grant-type:device_code'
            token_endpoint_auth_method: 'client_secret_post'  
            access_token_signed_response_alg: 'RS256'      
  users.yml: |
    users:
      svc:
        disabled: false
        displayname: 'Service Account'
        password: '$argon2id$v=19$m=65536,t=3,p=2$BpLnfgDsc2WD8F2q$o/vzA4myCqZZ36bUGsDY//8mKUYNZZaR0t4MFFSs+iM' # digest for 'password'
        email: 'svc@example.com'
        groups:
          - 'example'
          - 'service' 
---
kind: ConfigMap
apiVersion: v1
metadata:
  name: nginx-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: nginx
data:
  custom.conf: |
    server {
    listen 9081;
    location / {
        proxy_pass http://localhost:9091;
        proxy_set_header Host '$host';
        proxy_set_header X-Real-IP $remote_addr;
        location /.well-known/openid-configuration {
          proxy_set_header Accept-Encoding "";
          proxy_pass http://localhost:9091/.well-known/openid-configuration;
          sub_filter_types application/json;
          sub_filter '"issuer"' '"end_session_endpoint":"{{ tpl .Values.nginx_sub_filter.end_session_endpoint . }}", "issuer"';
          sub_filter_once on;
        }
      }
    }          
