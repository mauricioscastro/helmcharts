domain: apps.rmohbjxeoac4904b59.westus.aroapp.io
authelia_host_name: authelia
devhub_host_name: backstage-rhdh-rhdh
tpa_host_name: server-tpa

authentication_backend:
  ldap:
    implementation: glauth
    address: "ldap://glauth"
    base_dn: "dc=latam,dc=redhat"
    user: "cn=redhat,cn=ssa,dc=latam,dc=redhat"
    password: redhat
    users_filter: (&({username_attribute}={input})(objectClass=posixAccount))
    groups_filter: (&(uniqueMember={dn})(objectClass=posixGroup))

idp:
  jwks:
    pkfile: '' # > authelia crypto pair rsa generate --> path of private.pem generated

clients:
  developer_hub:
    client_secret: '' # > authelia crypto hash generate pbkdf2 --variant sha512 --password "your_secret"
    redirect_uris:
      - https://{{ .Values.devhub_host_name }}.{{ .Values.domain }}/api/auth/oidc/handler/frame

  trusted_profile_analyser:
    client_secret: '' # > authelia crypto hash generate pbkdf2 --variant sha512 --password "your_secret"
    redirect_uris:
      - 'https://{{ .Values.tpa_host_name }}.{{ .Values.domain }}'
      - 'https://{{ .Values.tpa_host_name }}.{{ .Values.domain }}/*'

  trusted_artifact_signer:
    client_secret: # > authelia crypto hash generate pbkdf2 --variant sha512 --password "your_secret"

route:
  to:
    kind: Service
    name: authelia
  port:
    targetPort: nginx
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

nginx_sub_filter:
  end_session_endpoint: https://{{ .Values.authelia_host_name }}.{{ .Values.domain }}/logout?rd=https://{{ .Values.tpa_host_name }}.{{ .Values.domain }}