apiVersion: batch/v1
kind: Job
metadata:
  name: remove-csv
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": post-delete
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  ttlSecondsAfterFinished: 60
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: check-devspaces-operator
          image: quay.io/zcve/bashkc
          command:
            - bash
            - -c    
            - |
              kubectl delete csv `kubectl get csv --no-headers -o custom-columns=NAME:.metadata.name | grep kubernetes-imagepuller-operator`